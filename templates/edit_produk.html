<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Produk | TOKO ILHAM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --dark-slate: #0f172a;
            --light-bg: #f8fafc;
            --card-border-radius: 16px;
        }

        body {
            background-color: var(--light-bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #334155;
        }

        /* Card container utama */
        .main-card {
            border: none;
            border-radius: var(--card-border-radius);
            background: white;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05) !important;
        }

        /* Penyelarasan Form */
        .form-label {
            font-weight: 600;
            color: #475569;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* Box khusus pratinjau gambar */
        .img-preview-box {
            background-color: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        /* Tombol */
        .btn {
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 20px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            
            <div class="mb-3">
                <a href="/admin/produk" class="text-decoration-none text-muted fw-medium small">
                    <i class="bi bi-arrow-left me-1"></i> Kembali ke Dashboard
                </a>
            </div>

            <div class="card main-card p-4 p-md-5">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="bg-primary text-white d-flex align-items-center justify-content-center rounded-3" style="width: 45px; height: 45px;">
                        <i class="bi bi-pencil-square fs-5"></i>
                    </div>
                    <div>
                        <h3 class="fw-bold text-dark m-0">Edit Informasi Produk</h3>
                        <p class="text-muted small m-0">Perbarui data aset dagangan toko Anda secara berkala</p>
                    </div>
                </div>

                <hr class="text-muted opacity-25 mb-4">

                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-4">
                        
                        <div class="col-md-7">
                            <div class="mb-3">
                                <label class="form-label">Nama Produk</label>
                                <input type="text" name="nama" class="form-control" value="{{ produk.nama_produk }}" placeholder="Contoh: Sepatu Sneakers Nike Air" required>
                            </div>

                            <div class="row">
                                <div class="col-sm-6 mb-3">
                                    <label class="form-label">Kategori</label>
                                    <select name="id_kategori" class="form-select">
                                        {% for k in kategori %}
                                        <option value="{{ k.id_kategori }}" {% if k.id_kategori == produk.id_kategori %}selected{% endif %}>
                                            {{ k.nama_kategori }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-sm-6 mb-3">
                                    <label class="form-label">Sisa Stok (Pcs)</label>
                                    <input type="number" name="stok" class="form-control" value="{{ produk.stok }}" min="0" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Harga Produk (Rp)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted fw-semibold">Rp</span>
                                    <input type="number" name="harga" class="form-control" value="{{ produk.harga }}" min="0" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Deskripsi Lengkap Produk</label>
                                <textarea name="deskripsi" class="form-control" rows="5" placeholder="Tuliskan spesifikasi produk di sini..." required>{{ produk.deskripsi }}</textarea>
                            </div>
                        </div>

                        <div class="col-md-5">
                            <div class="mb-3">
                                <label class="form-label d-block">Foto Produk Saat Ini</label>
                                <div class="img-preview-box shadow-sm mb-3">
                                    <img src="{{ url_for('static', filename='upload/' + produk.foto) }}" class="rounded-3 img-fluid border" style="max-height: 200px; object-fit: contain;" alt="Foto lama">
                                    <div class="text-muted mt-2" style="font-size: 11px;">
                                        <i class="bi bi-image me-1"></i> File: {{ produk.foto }}
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Ganti Foto Produk</label>
                                <input type="file" name="foto" class="form-control">
                                <div class="form-text text-muted" style="font-size: 11px;">
                                    *Biarkan kosong jika tidak ingin mengubah foto utama produk.
                                </div>
                            </div>
                        </div>

                    </div>

                    <hr class="text-muted opacity-25 my-4">

                    <div class="d-flex justify-content-end gap-2">
                        <a href="/admin/produk" class="btn btn-light px-4">Batal</a>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-circle me-1"></i> Simpan Perubahan
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
