<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Baru | TOKO ILHAM</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --light-bg: #f4f7fe;
            --card-border-radius: 24px;
            --transition-smooth: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--light-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #334155;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        /* Card Register Premium */
        .auth-card {
            border: none;
            border-radius: var(--card-border-radius);
            background: white;
            box-shadow: 0 15px 35px rgba(9, 13, 22, 0.05) !important;
            border: 1px solid rgba(226, 232, 240, 0.8);
            padding: 40px 30px !important;
        }

        /* Desain Header Logo */
        .auth-logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #3b82f6, #1d4ed8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        /* Kolom Input dengan Ikon */
        .input-group-text {
            background-color: #f8fafc;
            border-color: #e2e8f0;
            color: #64748b;
            border-radius: 12px 0 0 12px;
            padding-left: 16px;
            padding-right: 12px;
        }

        .form-control {
            border-radius: 0 12px 12px 0;
            border: 1px solid #e2e8f0;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            background-color: #f8fafc;
            transition: var(--transition-smooth);
        }

        .form-control:focus {
            background-color: white;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        
        .form-control:focus + .input-group-text,
        .input-group:focus-within .input-group-text {
            border-color: #3b82f6;
            color: #2563eb;
        }

        /* Button Premium */
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            padding: 12px;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        }

        /* Link teks bawah */
        .auth-link {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .auth-link:hover {
            color: #2563eb;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <div class="card auth-card shadow">
                
                <div class="text-center mb-4">
                    <a href="/" class="auth-logo mb-2 d-inline-block">
                        <i class="bi bi-lightning-charge-fill text-warning"></i> TOKO ILHAM
                    </a>
                    <h5 class="fw-bold text-dark m-0">Buat Akun Baru</h5>
                    <p class="text-muted small mt-1">Gabung sekarang dan nikmati promo gratis ongkirnya!</p>
                </div>

                <form method="POST">
                    
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="nama" class="form-control" placeholder="Nama Lengkap" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="Alamat Email" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Kata Sandi Baru" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2.5">
                        Mulai Mendaftar <i class="bi bi-arrow-right-circle ms-1"></i>
                    </button>

                </form>

                <div class="text-center mt-4">
                    <span class="text-muted small">Sudah memiliki akun?</span>
                    <a href="/login" class="auth-link fw-bold ms-1">Masuk Saja</a>
                </div>

            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
